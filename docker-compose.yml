services:

  # --- Base de donnÃ©es MongoDB ---
  db_mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    container_name: db_mongo
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db
      - ./mongo/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - db_network
      - app_network
    restart: on-failure
    healthcheck:
      test: >
        mongosh --username ${MONGO_INITDB_ROOT_USERNAME}
        --password ${MONGO_INITDB_ROOT_PASSWORD}
        --authenticationDatabase admin --quiet
        --eval "
          const count = db.getSiblingDB('blog_db').posts.countDocuments();
          if (count !== 5) { print('FAIL'); quit(1); }
          print('OK');
        "
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Base de donnÃ©es MySQL ---
  db_mysql:
    image: "mysql:8.0"
    container_name: db_mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/scripts:/docker-entrypoint-initdb.d
    networks:
      - db_network
    restart: on-failure
    healthcheck:
      test: >
        mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD} &&
        mysql -u root -p${MYSQL_ROOT_PASSWORD} -e
        "SELECT COUNT(*) FROM ynov_ci.utilisateur HAVING COUNT(*) = 5;" ynov_ci
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --- Interface web MongoDB ---
  admin_mongo:
    image: mongo-express
    container_name: admin_mongo
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${ME_CONFIG_MONGODB_ADMINUSERNAME}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${ME_CONFIG_MONGODB_ADMINPASSWORD}
      - ME_CONFIG_MONGODB_URL=${ME_CONFIG_MONGODB_URL}
      - ME_CONFIG_BASICAUTH_USERNAME=${ME_CONFIG_BASICAUTH_USERNAME}
      - ME_CONFIG_BASICAUTH_PASSWORD=${ME_CONFIG_BASICAUTH_PASSWORD}
    ports:
      - "8081:8081"
    networks:
      - db_network
      - app_network
    depends_on:
      db_mongo:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--header", "Authorization: Basic YWRtaW46YWRtaW4xMjM0", "http://0.0.0.0:8081"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # --- Interface web MySQL ---
  admin_mysql:
    image: adminer
    container_name: admin_mysql
    ports:
      - "8080:8080"
    networks:
      - db_network
      - app_network
    depends_on:
      db_mysql:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --- API FastAPI ---
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: fastapi
    environment:
      - MYSQL_HOST=db_mysql
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MONGO_HOST=db_mongo
      - MONGO_USER=${MONGO_USER}
      - MONGO_PASSWORD=${MONGO_PASSWORD}
    ports:
      - "8000:8000"
    networks:
      - db_network
      - app_network
    depends_on:
      db_mongo:
        condition: service_healthy
      db_mysql:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/users'); urllib.request.urlopen('http://localhost:8000/posts')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

# --- Volumes nommÃ©s pour la persistance ---
volumes:
  mongo_data:
  mysql_data:

# --- RÃ©seaux ---
networks:
  db_network:
    internal: true    # isolÃ© de l'extÃ©rieur
  app_network:
    internal: false   # accessible depuis l'hÃ´te